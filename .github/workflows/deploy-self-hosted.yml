name: Deploy (Self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Ensure Deployer phar present
        run: |
          set -euo pipefail
          DEP_BIN="$HOME/.deployer/dep.phar"
          DEP_VERSION="7.5.7"
          if [ ! -f "$DEP_BIN" ]; then
            mkdir -p "$(dirname "$DEP_BIN")"
            curl -fsSL "https://deployer.org/releases/v${DEP_VERSION}/deployer.phar" -o "$DEP_BIN"
            chmod +x "$DEP_BIN"
          fi
          php "$DEP_BIN" --version

      - name: Deploy production
        env:
          DEPLOY_PATH: /var/www/threejs
          VERIFY_BASE_URL: https://threejs.dogeow.com
          PM2_APP: threejs
          PORT: "3005"
          RUNNER_TRACKING_ID: ""
        run: php "$HOME/.deployer/dep.phar" deploy production -v

      - name: Notify dogeow deployment
        if: success()
        env:
          APP_NAME: three.js
          APP_URL: https://threejs.dogeow.com
        run: |
          set -euo pipefail
          php /var/www/dogeow-api/current/artisan notify:deploy "$APP_NAME" \
            --title="部署完成：$APP_NAME" \
            --body="react-laravel/$APP_NAME 已通过 GitHub self-hosted runner 部署成功（${GITHUB_SHA::7}）" \
            --url="$APP_URL" \
            --no-interaction || true
